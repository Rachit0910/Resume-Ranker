# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for debugging errors during development (e.g. git/conda setup
  issues, environment configuration, fixing the tie-breaking validation
  error in rank.py, fixing a score-scaling bug in the Streamlit sandbox).
  No candidate data was shared with any external LLM API during scoring —
  Claude was used only during development for debugging support, not at
  ranking runtime.
# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. Phase 1 (offline, untimed): candidate profiles are
  converted to short text blobs and embedded using sentence-transformers
  (all-MiniLM-L6-v2); JD requirements text is embedded the same way.
  Phase 2 (CPU-only, no network, <5 min): each candidate is scored on
  semantic similarity (precomputed embedding cosine sim), title/seniority
  fit, must-have skill coverage (weighted by proficiency, duration,
  endorsements, and platform assessment scores to penalize keyword
  stuffing), experience fit, location fit, and nice-to-have skills.
  A multiplicative career-trajectory penalty down-weights research-only,
  consulting-only, title-chasing, and no-recent-code patterns. A behavioral
  signal multiplier (from redrob_signals) adjusts for activity recency,
  recruiter response rate, interview completion rate, and notice period.
  A honeypot penalty flags internally inconsistent profiles (e.g. expert
  skill with near-zero duration, experience/history mismatch). Final score
  is the weighted sum of fit components, multiplied by the trajectory,
  behavioral, and honeypot penalties. Runtime is ~78 seconds for 100K
  candidates on a CPU-only Windows laptop, well under the 5-minute budget.

